<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Center Detail</title>
    <link rel="stylesheet" href="../base_styles.css">
    <style>
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--text-secondary);
        text-decoration: none;
        margin-bottom: 15px;
        font-weight: 500;
    }

    .back-link:hover {
        color: var(--accent-blue);
    }

    .table-container {
        overflow-x: auto;
    }

    .pr-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        color: white;
    }

    .agent-name {
        font-weight: 500;
    }

    .extension {
        color: var(--text-secondary);
        font-size: 0.85rem;
    }

    td.number {
        text-align: right;
    }

    th.number {
        text-align: right;
    }

    .summary-bar {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .summary-item {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .summary-item .value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-blue);
    }

    .summary-item .value.success {
        color: var(--accent-green);
    }

    .summary-item .value.warning {
        color: var(--accent-orange);
    }

    .summary-item .value.danger {
        color: var(--accent-red);
    }

    .summary-item .label {
        font-size: 0.8rem;
        color: var(--text-secondary);
        text-transform: uppercase;
    }

    .metrics-bar {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .metric-chip {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .metric-chip .label {
        color: var(--text-secondary);
    }

    .metric-chip .value {
        font-weight: 600;
        color: var(--text-primary);
    }

    tr.pr-row {
        background: linear-gradient(90deg, rgba(255, 107, 107, 0.08), transparent) !important;
    }

    tr.pr-row td:first-child {
        border-left: 3px solid #ff6b6b;
    }

    .rank-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        font-weight: 600;
        font-size: 0.85rem;
    }

    .rank-badge.rank-1 {
        background: linear-gradient(135deg, #ffd700, #ffed4a);
        color: #8b4513;
    }

    .rank-badge.rank-2 {
        background: linear-gradient(135deg, #c0c0c0, #e8e8e8);
        color: #555;
    }

    .rank-badge.rank-3 {
        background: linear-gradient(135deg, #cd7f32, #daa520);
        color: white;
    }

    .rank-badge.rank-default {
        background: var(--bg-tertiary);
        color: var(--text-secondary);
    }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="https://sweetgrasspharmacy.com" class="logo"><img src="https://sweetgrasspharmacy.com/wp-content/uploads/2023/09/Sweetgrass-Pharmacy-and-Compounding-logo.svg" alt="Sweetgrass Pharmacy"></a>
            <nav>
                <a href="pharmacist.html">Pharmacist</a>
                <a href="call_center.html">Call Center</a>
                <a href="prescription_entry.html">Rx Entry</a>
                <a href="dispensing.html">Dispensing</a>
                <a href="shipping.html">Shipping</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <a href="call_center.html" class="back-link">
            &larr; Back to Call Center Dashboard
        </a>

        <div class="page-header" id="pageHeader">
            <h1 id="pageTitle">Loading...</h1>
            <p id="pageDescription"></p>
        </div>

        <div class="summary-bar" id="summaryBar">
            <div class="loading">Loading summary...</div>
        </div>

        <div class="metrics-bar" id="metricsBar" style="display: none;"></div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Agent Breakdown</span>
                <span id="agentCount" class="badge badge-info">0 agents</span>
            </div>
            <div class="table-container" id="agentTable">
                <div class="loading">Loading agents...</div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="refresh-indicator">
                <span class="refresh-dot"></span>
                <span>Auto-refresh enabled</span>
            </div>
        </div>
    </footer>

<script>
const DATA_BASE = '../data/';

function getFilterType() {
    const params = new URLSearchParams(window.location.search);
    return params.get('type') || 'total_calls';
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
        const date = new Date(dateStr + 'T00:00:00');
        if (isNaN(date.getTime())) return dateStr;
        const options = { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' };
        return date.toLocaleDateString('en-US', options);
    } catch (e) {
        return dateStr;
    }
}

function getValueClass(filterType) {
    if (filterType === 'answered') return 'success';
    if (filterType === 'abandoned') return 'danger';
    return '';
}

function getRankClass(index) {
    if (index < 3) return 'rank-' + (index + 1);
    return 'rank-default';
}

async function fetchData() {
    const filterType = getFilterType();
    const dataFile = DATA_BASE + 'call_center_detail_' + filterType + '.json';

    try {
        const response = await fetch(dataFile);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        renderPage(data);
    } catch (error) {
        console.error('Error fetching data:', error);
        document.getElementById('pageTitle').textContent = 'Error Loading Data';
        document.getElementById('pageDescription').textContent = 'Could not load data for filter type: ' + filterType;
        document.getElementById('summaryBar').innerHTML = '<p class="empty-state">Unable to load data. Please check that the data file exists.</p>';
        document.getElementById('agentTable').innerHTML = '<p class="empty-state">No data available.</p>';
    }
}

function renderPage(data) {
    const filterType = data.filter_type || getFilterType();

    // Page header
    document.title = data.title || 'Call Center Detail';
    document.getElementById('pageTitle').textContent = data.title || 'Call Center Detail';
    document.getElementById('pageDescription').textContent = data.description || '';

    // Summary bar
    const valueClass = getValueClass(filterType);
    const items = data.items || [];
    let summaryHtml = '';
    summaryHtml += '<div class="summary-item">';
    summaryHtml += '<div class="value ' + valueClass + '">' + (data.total_count || 0) + '</div>';
    summaryHtml += '<div class="label">' + (data.title || '') + '</div>';
    summaryHtml += '</div>';
    if (data.metrics) {
        summaryHtml += '<div class="summary-item">';
        summaryHtml += '<div class="value">' + items.length + '</div>';
        summaryHtml += '<div class="label">Agents</div>';
        summaryHtml += '</div>';
    }
    document.getElementById('summaryBar').innerHTML = summaryHtml;

    // Metrics bar
    const metricsBar = document.getElementById('metricsBar');
    if (data.metrics) {
        metricsBar.style.display = 'flex';
        let metricsHtml = '';
        metricsHtml += '<div class="metric-chip"><span class="label">Date:</span><span class="value">' + formatDate(data.filter_date) + '</span></div>';
        metricsHtml += '<div class="metric-chip"><span class="label">Total Calls:</span><span class="value">' + data.metrics.total_calls + '</span></div>';
        metricsHtml += '<div class="metric-chip"><span class="label">Answered:</span><span class="value">' + data.metrics.answered + '</span></div>';
        metricsHtml += '<div class="metric-chip"><span class="label">Abandoned:</span><span class="value">' + data.metrics.abandoned + '</span></div>';
        metricsHtml += '<div class="metric-chip"><span class="label">Answer Rate:</span><span class="value">' + data.metrics.answer_rate + '%</span></div>';
        metricsHtml += '<div class="metric-chip"><span class="label">Avg Speed:</span><span class="value">' + data.metrics.avg_answer_speed + '</span></div>';
        metricsBar.innerHTML = metricsHtml;
    } else {
        metricsBar.style.display = 'none';
    }

    // Agent count badge
    document.getElementById('agentCount').textContent = items.length + ' agents';

    // Agent table
    const tableContainer = document.getElementById('agentTable');
    if (items.length === 0) {
        tableContainer.innerHTML = '<p class="empty-state">No agent data found for this filter.</p>';
        return;
    }

    const showTotal = filterType === 'total_calls';

    let tableHtml = '<table><thead><tr>';
    tableHtml += '<th>Rank</th>';
    tableHtml += '<th>Agent</th>';
    tableHtml += '<th class="number">Answered</th>';
    tableHtml += '<th class="number">Missed</th>';
    if (showTotal) {
        tableHtml += '<th class="number">Total</th>';
    }
    tableHtml += '<th>Avg Duration</th>';
    tableHtml += '<th>Avg Speed</th>';
    tableHtml += '<th>Achievement</th>';
    tableHtml += '</tr></thead><tbody>';

    items.forEach(function(item, index) {
        const rowClass = item.is_personal_record ? 'pr-row' : '';
        const rankClass = getRankClass(index);

        tableHtml += '<tr class="' + rowClass + '">';
        tableHtml += '<td><span class="rank-badge ' + rankClass + '">' + (index + 1) + '</span></td>';
        tableHtml += '<td><span class="agent-name">' + escapeHtml(item.name) + '</span> <span class="extension">(' + escapeHtml(item.extension) + ')</span></td>';
        tableHtml += '<td class="number">' + item.answered + '</td>';
        tableHtml += '<td class="number">' + item.missed + '</td>';
        if (showTotal) {
            tableHtml += '<td class="number">' + item.total + '</td>';
        }
        tableHtml += '<td>' + escapeHtml(item.avg_duration) + '</td>';
        tableHtml += '<td>' + escapeHtml(item.avg_speed) + '</td>';
        tableHtml += '<td>';
        if (item.is_personal_record) {
            tableHtml += '<span class="pr-badge">NEW PR!</span>';
        }
        tableHtml += '</td>';
        tableHtml += '</tr>';
    });

    tableHtml += '</tbody></table>';
    tableContainer.innerHTML = tableHtml;
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(String(str)));
    return div.innerHTML;
}

// Initial load
fetchData();

// Auto-refresh every 60 seconds
setInterval(fetchData, 60000);
</script>
</body>
</html>
